services:
  mongodb:
    image: mongo:latest
    container_name: tech-atlas-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - 27017:27017
    networks:
      - tech_atlas_local
    volumes:
      - db-data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
      - ./.env:/.env
    
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${DB_ROOT_USERNAME}:${DB_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: user
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    networks:
      - tech_atlas_local

  dashboard-ui:
    image: moosi312/tech-atlas-dashboard-ui
    container_name: tech-atlas-dashboard-ui
    restart: unless-stopped
    ports:
      - 4200:8080

  dashboard-be:
    image: moosi312/tech-atlas-dashboard-be
    container_name: tech-atlas-dashboard-be
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb:27017
      - DB_NAME=${DB_FE_DATABASE}
      - DB_USER=${DB_FE_R_USER}
      - DB_PASS=${DB_FE_R_PASS}
    ports:
      - 8080
    networks:
      - tech_atlas_local

  admin-ui:
    image: moosi312/tech-atlas-admin-ui
    container_name: tech-atlas-admin-ui
    restart: unless-stopped
    ports:
      - 4300:8080

  scraper-be:
    image: moosi312/tech-atlas-scraper-be
    container_name: tech-atlas-scraper-be
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb:27017
      - DB_PIPE_NAME=${DB_PIPE_DATABASE}
      - DB_PIPE_USER=${DB_PIPE_USER_RW}
      - DB_PIPE_PASS=${DB_PIPE_PASS_RW}
      - DB_RAW_NAME=${DB_RAW_DATABASE}
      - DB_RAW_USER=${DB_RAW_RW_USER}
      - DB_RAW_PASS=${DB_RAW_RW_PASS}
      - OAUTH_ISSUER=${OAUTH_ISSUER}
      - OAUTH_AUDIENCE=${OAUTH_AUDIENCE}
    ports:
      - 8050:8080
    networks:
      - tech_atlas_local

  transformer-be:
    image: moosi312/tech-atlas-transformer-be
    container_name: tech-atlas-transformer-be
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb:27017
      - DB_PIPE_NAME=${DB_PIPE_DATABASE}
      - DB_PIPE_USER=${DB_PIPE_USER_RW}
      - DB_PIPE_PASS=${DB_PIPE_PASS_RW}
      - DB_RAW_NAME=${DB_RAW_DATABASE}
      - DB_RAW_USER=${DB_RAW_RW_USER}
      - DB_RAW_PASS=${DB_RAW_RW_PASS}
      - DB_FE_DATABASE=${DB_FE_DATABASE}
      - DB_FE_RW_USER=${DB_FE_RW_USER}
      - DB_FE_RW_PASS=${DB_FE_RW_PASS}
      - OAUTH_ISSUER=${OAUTH_ISSUER}
      - OAUTH_AUDIENCE=${OAUTH_AUDIENCE}
    ports:
      - 8060:8080
    networks:
      - tech_atlas_local

  oidc-mock:
    image: ghcr.io/navikt/mock-oauth2-server:latest
    ports:
      - "7000:8080"
    volumes:
      - ./auth/config.json:/app/config.json
      - ./auth/login.example.html:/app/login/login.example.html
      - ./auth/static/:/app/static/
    environment:
      LOG_LEVEL: "debug"
      SERVER_PORT: 8080
      JSON_CONFIG_PATH: /app/config.json
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/isalive" ]
      start_period: 5s
      retries: 10
      interval: 2s
      timeout: 1s

volumes:
  db-data:
  database:
    driver: local

networks:
  tech_atlas_local: 
    name: tech_atlas_local
